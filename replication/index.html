<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alien Language Study – Experiment 1</title>

    <!-- jsPsych core -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <!-- Plugins -->
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <!-- jsPsych default CSS (layout base) -->
    <link
      href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css"
      rel="stylesheet"
    />

    <!-- Google Fonts: DM Serif Display (headings) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── Design tokens ─────────────────────────────────────────────────────── */
      :root {
        --bg: #f5f2ec; /* warm off-white parchment */
        --surface: #ffffff;
        --border: #d9d3c7;
        --text: #1e1b16;
        --text-muted: #6b6459;
        --accent-gulu: #3a7d44; /* green — Gulu */
        --accent-norl: #c0392b; /* red   — Norl */
        --accent-blue: #2c5f8a; /* neutral action colour */
        --correct: #2d7a40;
        --incorrect: #b03030;
        --radius: 10px;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        --font-head: "DM Serif Display", Georgia, serif;
        --font-body: "DM Sans", system-ui, sans-serif;
      }

      /* ── Reset / base ──────────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        background-color: var(--bg);
        color: var(--text);
        font-size: 18px;
        line-height: 1.65;
      }

      /* jsPsych overrides */
      .jspsych-display-element {
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .jspsych-content {
        max-width: 820px;
        width: 100%;
      }

      /* ── Instruction screens ───────────────────────────────────────────────── */
      .instr-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 48px 52px;
        box-shadow: var(--shadow);
        max-width: 700px;
        margin: 0 auto;
      }

      .instr-box h1 {
        font-family: var(--font-head);
        font-size: 2rem;
        margin-bottom: 18px;
        color: var(--text);
        letter-spacing: -0.02em;
      }

      .instr-box h2 {
        font-family: var(--font-head);
        font-size: 1.55rem;
        margin-bottom: 14px;
        color: var(--text);
      }

      .instr-box p,
      .instr-box li {
        font-size: 1rem;
        color: var(--text);
        margin-bottom: 10px;
      }

      .instr-box ul {
        padding-left: 22px;
        margin-bottom: 14px;
      }

      .instr-box li {
        margin-bottom: 6px;
      }

      /* ── Trial container ───────────────────────────────────────────────────── */
      .trial-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 36px 40px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        max-width: 660px;
        margin: 0 auto;
        text-align: center;
      }

      /* Stage 2 trial: alien speaker sits in top-left corner of the card */
      .stage2-trial {
        position: relative;
      }

      .alien-speaker {
        display: flex;
        align-items: center;
        gap: 10px;
        align-self: flex-start;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 14px;
      }

      /* ── Images ────────────────────────────────────────────────────────────── */
      .stim-image {
        max-width: 200px;
        max-height: 200px;
        object-fit: contain;
        border-radius: 6px;
      }

      .alien-image {
        max-width: 220px;
        max-height: 220px;
        object-fit: contain;
      }

      .alien-small {
        width: 52px;
        height: 52px;
        object-fit: contain;
      }

      .alien-medium {
        width: 90px;
        height: 90px;
        object-fit: contain;
      }

      /* ── Word display ──────────────────────────────────────────────────────── */
      .word-display {
        font-family: var(--font-head);
        font-size: 2rem;
        letter-spacing: 0.04em;
        color: var(--text);
      }

      /* ── Instruction text inside trial ────────────────────────────────────── */
      .instr-text {
        font-size: 0.95rem;
        color: var(--text-muted);
        font-style: italic;
      }

      /* ── Species labels ────────────────────────────────────────────────────── */
      .species-label {
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .gulu-label {
        color: var(--accent-gulu);
      }
      .norl-label {
        color: var(--accent-norl);
      }

      /* ── Alien-selection header (shows both aliens side by side) ───────────── */
      .alien-choices-header {
        display: flex;
        gap: 40px;
        justify-content: center;
        margin-bottom: 4px;
      }

      .alien-option {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      /* ── Feedback boxes ────────────────────────────────────────────────────── */
      .feedback-box {
        border-width: 2px;
      }

      .feedback-correct {
        border-color: var(--correct);
        background: #f0faf2;
      }

      .feedback-correct p {
        color: var(--correct);
        font-weight: 600;
      }

      .feedback-incorrect {
        border-color: var(--incorrect);
        background: #fdf2f2;
      }

      .feedback-incorrect p {
        color: var(--incorrect);
        font-weight: 600;
      }

      /* ── Buttons ───────────────────────────────────────────────────────────── */
      /* Note: jsPsych v8 removed button_html. All buttons share .jspsych-btn.   */
      /* Single-choice trials (Continue) get the blue filled style;               */
      /* multi-choice trials get the outlined style via :not(:only-child).        */

      .jspsych-btn {
        font-family: var(--font-body) !important;
        font-size: 1rem !important;
        border-radius: 8px !important;
        cursor: pointer !important;
        transition:
          background 0.15s,
          transform 0.1s,
          box-shadow 0.15s !important;
        padding: 12px 30px !important;
      }

      .jspsych-btn:active {
        transform: translateY(1px) !important;
      }

      /* When there is only one button on screen it acts as a "Continue" button */
      .jspsych-html-button-response-button:only-child .jspsych-btn {
        background: var(--accent-blue) !important;
        color: #fff !important;
        border: none !important;
        font-weight: 500 !important;
        box-shadow: 0 2px 6px rgba(44, 95, 138, 0.25) !important;
      }

      .jspsych-html-button-response-button:only-child .jspsych-btn:hover {
        background: #1f4a6e !important;
        box-shadow: 0 3px 10px rgba(44, 95, 138, 0.35) !important;
      }

      /* When there are multiple buttons they act as answer choices */
      .jspsych-html-button-response-button:not(:only-child) .jspsych-btn {
        background: var(--surface) !important;
        color: var(--text) !important;
        border: 1.5px solid var(--border) !important;
        font-weight: 400 !important;
        min-width: 160px;
      }

      .jspsych-html-button-response-button:not(:only-child) .jspsych-btn:hover {
        background: var(--bg) !important;
        border-color: var(--accent-blue) !important;
        color: var(--accent-blue) !important;
      }

      /* jsPsych wraps buttons in a div; make them lay out nicely */
      .jspsych-html-button-response-button {
        display: inline-block;
        margin: 6px 8px !important;
      }

      /* ── Novel word pair (suffix-selection test) ───────────────────────────── */
      .novel-word-pair {
        display: flex;
        gap: 40px;
        justify-content: center;
        align-items: flex-end;
      }

      .novel-word-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .novel-unknown {
        color: var(--text-muted);
        letter-spacing: 0.1em;
      }

      /* ── Responsive ────────────────────────────────────────────────────────── */
      @media (max-width: 600px) {
        .instr-box {
          padding: 28px 22px;
        }
        .trial-box {
          padding: 24px 18px;
        }
        .word-display {
          font-size: 1.5rem;
        }
        .stim-image {
          max-width: 150px;
          max-height: 150px;
        }
      }
    </style>
  </head>
  <body></body>
  <script src="stimuli.js"></script>
  <script src="experiment.js"></script>
</html>
